services:
  zarrcade:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zarrcade
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Mount custom config at runtime (optional)
      - ${CONFIG_FILE:-./config.json}:/usr/share/nginx/html/config.json:ro
    environment:
      - NGINX_HOST=localhost
